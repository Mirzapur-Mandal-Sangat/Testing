<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Mirzapur Mandal App</title>
  
  <!-- PWA Install Tags -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  
  <style>
    /* एकदम फुल स्क्रीन, बिना किसी बॉर्डर के */
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f4f7f9; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <!-- आपका Google Script URL iframe में -->
  <iframe src="https://script.google.com/macros/s/AKfycbyzVAkFgZYtjW_CWxysdovKBpZizvg998DYog-0EJXN6uvU_1_RDmvYUcPmVuEphPk4/exec" allow="camera; microphone"></iframe>

  <script>
    // Service Worker for App Installation
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed:', err));
        });
    }
  </script>
</body>
</html>
